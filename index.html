<html lang="en">
<head>

<title>Flapping Trump - Free Online Browser Game</title>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;
  -webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;overscroll-behavior:none}
#app{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
#wrap{position:relative;width:100%;height:100%;max-width:calc(100vh*.6)}
@media(orientation:portrait){#wrap{max-width:100%}}
canvas{display:block;width:100%;height:100%}

/* ─── TOAST ─── */
#toast{
  position:absolute;left:50%;transform:translateX(-50%) translateY(-140px);
  top:calc(var(--safe-top) + 10px);
  background:linear-gradient(135deg,#12002e,#2a0060);
  border:2.5px solid;border-radius:16px;
  padding:13px 18px;display:flex;align-items:center;gap:13px;
  min-width:290px;max-width:94vw;
  transition:transform .42s cubic-bezier(.34,1.56,.64,1);
  z-index:30;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.7);
}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.tier-bronze{border-color:#CD7F32}
#toast.tier-silver{border-color:#C0C0C0}
#toast.tier-gold  {border-color:#FFD700}
#toast.tier-plat  {border-color:#00FFFF}
#toast.tier-legend{border-color:#FF00FF}
#t-icon{font-size:34px;line-height:1;flex-shrink:0}
#t-badge{font-family:'Press Start 2P',monospace;font-size:7px;margin-bottom:3px}
#toast.tier-bronze #t-badge{color:#CD7F32}
#toast.tier-silver #t-badge{color:#C0C0C0}
#toast.tier-gold   #t-badge{color:#FFD700}
#toast.tier-plat   #t-badge{color:#00FFFF}
#toast.tier-legend #t-badge{color:#FF00FF}
#t-name{font-family:'VT323',monospace;font-size:21px;color:#fff}
#t-desc{font-family:'VT323',monospace;font-size:14px;color:rgba(255,255,255,.5)}

/* ─── ACHIEVEMENTS OVERLAY ─── */
#ach-ov{
  position:absolute;inset:0;background:rgba(0,0,0,.96);
  display:none;flex-direction:column;align-items:center;
  padding:max(14px,var(--safe-top)) 12px max(14px,var(--safe-bot));
  z-index:20;overflow-y:auto;-webkit-overflow-scrolling:touch;
  gap:0;
}
#ach-ov.open{display:flex}
#ach-ov h2{font-family:'Press Start 2P',monospace;color:#FFD700;
  font-size:clamp(12px,3.8vw,19px);margin-bottom:3px;text-align:center}
#ach-stats{font-family:'VT323',monospace;font-size:clamp(14px,3.5vw,18px);
  color:rgba(255,255,255,.45);margin-bottom:12px;text-align:center}
/* Filter tabs */
#ach-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
.ach-tab{font-family:'Press Start 2P',monospace;font-size:7px;padding:6px 10px;
  border-radius:6px;border:1.5px solid rgba(255,255,255,.2);background:transparent;
  color:rgba(255,255,255,.45);cursor:pointer}
.ach-tab.active{border-color:#FFD700;color:#FFD700;background:rgba(255,215,0,.08)}
/* Grid */
#ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));
  gap:9px;width:100%;max-width:520px}
.ac{border-radius:12px;padding:11px 9px;text-align:center;
  border:2px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);
  transition:transform .15s,border-color .3s}
.ac.unlocked{transform:none}
.ac.locked  {opacity:.55}
.ac.secret.locked{opacity:.3}
.ac.tier-bronze.unlocked{border-color:#CD7F32;background:linear-gradient(135deg,rgba(205,127,50,.15),rgba(139,86,34,.08))}
.ac.tier-silver.unlocked{border-color:#C0C0C0;background:linear-gradient(135deg,rgba(192,192,192,.15),rgba(128,128,128,.08))}
.ac.tier-gold.unlocked  {border-color:#FFD700;background:linear-gradient(135deg,rgba(255,215,0,.18),rgba(200,140,0,.08))}
.ac.tier-plat.unlocked  {border-color:#00FFFF;background:linear-gradient(135deg,rgba(0,255,255,.15),rgba(0,160,160,.08))}
.ac.tier-legend.unlocked{border-color:#FF00FF;background:linear-gradient(135deg,rgba(255,0,255,.18),rgba(160,0,160,.08))}
.ac-em{font-size:30px;display:block;margin-bottom:5px;
  transition:filter .3s;filter:grayscale(1) brightness(.5)}
.ac.unlocked .ac-em{filter:none}
.ac.secret.locked .ac-em{filter:grayscale(1) brightness(.15)}
.ac-name{font-family:'Press Start 2P',monospace;font-size:6.5px;
  color:rgba(255,255,255,.7);line-height:1.5;margin-bottom:3px}
.ac.unlocked.tier-bronze .ac-name{color:#CD7F32}
.ac.unlocked.tier-silver .ac-name{color:#C0C0C0}
.ac.unlocked.tier-gold   .ac-name{color:#FFD700}
.ac.unlocked.tier-plat   .ac-name{color:#00FFFF}
.ac.unlocked.tier-legend .ac-name{color:#FF00FF}
.ac.secret.locked .ac-name{color:rgba(255,255,255,.2)}
.ac-desc{font-family:'VT323',monospace;font-size:12px;color:rgba(255,255,255,.4);line-height:1.3}
.ac.unlocked .ac-desc{color:rgba(255,255,255,.55)}
/* Progress bar on card */
.ac-bar-wrap{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:5px;overflow:hidden}
.ac-bar{height:100%;border-radius:2px;transition:width .5s}
#ach-back{margin-top:16px;flex-shrink:0;
  background:linear-gradient(180deg,#c62828,#7f0000);
  border:2px solid rgba(255,255,255,.4);border-radius:8px;
  color:#fff;font-family:'Press Start 2P',monospace;
  font-size:clamp(9px,2.3vw,12px);padding:11px 26px;cursor:pointer}
</style>
</head>

function load(){try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch(e){return{}}}
function save(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){}}
let P=load();
P.highScore  = P.highScore  || 0;
P.deaths     = P.deaths     || 0;
P.totalFlaps = P.totalFlaps || 0;
P.maxCombo   = P.maxCombo   || 0;
P.maxLvIdx   = P.maxLvIdx   || 0;
P.unlocked   = P.unlocked   || [];
save(P);
function saveHS(s){if(s>P.highScore){P.highScore=s;save(P)}}

const toastEl=document.getElementById('toast');
const tIcon=document.getElementById('t-icon');
const tBadge=document.getElementById('t-badge');
const tName=document.getElementById('t-name');
const tDesc=document.getElementById('t-desc');
let tQ=[],tBusy=false;
const TIER_CLS=['tier-bronze','tier-silver','tier-gold','tier-plat','tier-legend'];

function showToast(a){tQ.push(a);if(!tBusy)nextToast()}
function nextToast(){
  if(!tQ.length){tBusy=false;return}
  tBusy=true;const a=tQ.shift();
  toastEl.className=''; // reset tiers
  toastEl.classList.add(a.tier||'tier-bronze');
  tIcon.textContent=a.emoji;
  tBadge.textContent=`${TIER_LABELS[a.tier]||'ACHIEVEMENT'} UNLOCKED!`;
  tName.textContent=a.name;
  tDesc.textContent=a.desc;
  toastEl.classList.add('show');
  setTimeout(()=>{toastEl.classList.remove('show');setTimeout(nextToast,550)},2900);
}

//  ACHIEVEMENT CHECK
// ════════════════════════════════════════════
function snap(gs){
  return{
    score:gs.score, lvIdx:getLv(gs.score).idx,
    deaths:P.deaths, totalFlaps:P.totalFlaps,
    maxCombo:Math.max(P.maxCombo,gs.combo||0),
    sessionBest:gs.sessionBest||0, quickStart:gs.quickStart||false,
    lastScore:gs.score, maxLvIdx:P.maxLvIdx,
    runDeaths:gs.runDeaths||0,
  };
}
function checkAch(gs){
  const s=snap(gs);
  for(const a of ACH){
    if(P.unlocked.includes(a.id))continue;
    if(a.check(s)){P.unlocked.push(a.id);save(P);showToast(a)}
  }
}

const achOv   =document.getElementById('ach-ov');
const achStats=document.getElementById('ach-stats');
const achGrid =document.getElementById('ach-grid');
const achBack =document.getElementById('ach-back');
let activeFilter='all';

document.querySelectorAll('.ach-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.ach-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter=btn.dataset.filter;
    renderAchGrid();
  });
});

function renderAchGrid(){
  const done=P.unlocked.length,total=ACH.length;
  achStats.textContent=`${done} / ${total} unlocked  •  Best: ${P.highScore}  •  Deaths: ${P.deaths}`;

  let list=ACH;
  if(activeFilter==='unlocked')list=ACH.filter(a=>P.unlocked.includes(a.id));
  else if(activeFilter==='locked')list=ACH.filter(a=>!P.unlocked.includes(a.id));
  else if(activeFilter!=='all')list=ACH.filter(a=>a.tier===activeFilter);

  achGrid.innerHTML=list.map(a=>{
    const got=P.unlocked.includes(a.id);
    const isSecret=a.secret&&!got;
    const tierCls=a.tier||'tier-bronze';
    const col=TIER_COLORS[tierCls]||'#FFD700';
    let bar='';
    if(!isSecret&&a.progress){
      const {cur,max}=a.progress(snap({score:P.highScore,combo:P.maxCombo,sessionBest:P.highScore,maxLvIdx:P.maxLvIdx}));
      const pct=Math.round(Math.min(cur/max,1)*100);
      bar=`<div class="ac-bar-wrap"><div class="ac-bar" style="width:${pct}%;background:${col}"></div></div>`;
    }
    return`<div class="ac ${tierCls} ${got?'unlocked':'locked'} ${isSecret?'secret':''}">
      <span class="ac-em">${isSecret?'❓':a.emoji}</span>
      <div class="ac-name">${isSecret?'???':a.name}</div>
      <div class="ac-desc">${isSecret?'Hidden achievement':a.desc}</div>
      ${bar}
    </div>`;
  }).join('');
}

function openAch(){achOv.classList.add('open');renderAchGrid()}
function closeAch(){achOv.classList.remove('open')}
achBack.addEventListener('click',closeAch);
achOv.addEventListener('touchstart',e=>e.stopPropagation());
achOv.addEventListener('mousedown',e=>e.stopPropagation());

let aC=null,aBufs={},aRdy=false;
function ensureAudio(){
  if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)();
  if(aC.state==='suspended')aC.resume();
}
async function loadAudio(){
  if(aRdy)return;if(!aC)return;aRdy=true;
  for(const[id,inf]of Object.entries(ASSETS)){
    if(inf.type!=='audio')continue;
    try{const ab=await(await fetch(inf.url)).arrayBuffer();aBufs[id]=await aC.decodeAudioData(ab)}catch(e){}
  }
}
function playSound(id,v=1){
  if(!aC||!aBufs[id])return;
  try{const s=aC.createBufferSource(),g=aC.createGain();s.buffer=aBufs[id];g.gain.value=v;
    s.connect(g);g.connect(aC.destination);s.start(0)}catch(e){}
}

const wrap=document.getElementById('wrap');

const ctx=cv.getContext('2d');
const VW=480,VH=854;
cv.width=VW;cv.height=VH;

// ════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════
const GH=90,CW=58,CH=52,CX=VW*.26,PW=78,MAXDT=.1,HB=.30;

// ════════════════════════════════════════════
//  PARTICLES
// ════════════════════════════════════════════
let pts=[];
function spawnPts(x,y,n,cols,sp=1){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=(60+Math.random()*180)*sp;
    pts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-60,life:1,decay:.018+Math.random()*.022,r:4+Math.random()*5,col:cols[~~(Math.random()*cols.length)]});
  }
}
function updPts(dt){
  for(const p of pts){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=600*dt;p.life-=p.decay}
  pts=pts.filter(p=>p.life>0);
}
function drwPts(){
  for(const p of pts){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();ctx.restore()}
}

//  SCREEN SHAKE
// ════════════════════════════════════════════
let shAmt=0,shDur=0;
function shake(a,d){shAmt=a;shDur=d}
function getShake(dt){
  if(shDur<=0)return{sx:0,sy:0};shDur-=dt;
  return{sx:(Math.random()-.5)*2*shAmt,sy:(Math.random()-.5)*2*shAmt};
}

// ════════════════════════════════════════════
//  STARS
// ════════════════════════════════════════════
const STARS=Array.from({length:70},()=>({x:Math.random()*VW,y:Math.random()*VH*.72,r:.4+Math.random()*1.6,a:.3+Math.random()*.7}));

// ════════════════════════════════════════════
//  WIND & LEAF SYSTEM
// ════════════════════════════════════════════

// Wind state — gusts are random intervals
const wind={
  strength:0,      // current wind push (px/s, positive = leftward = same dir as game scroll)
  target:0,        // strength we're easing toward
  timer:0,         // countdown to next gust decision
  gusting:false,   // true during a gust
  gustAlpha:0,     // visual opacity of wind lines (0-1)
};

// Leaf pool
const LEAF_COLORS=['#4CAF50','#66BB6A','#388E3C','#81C784','#2E7D32','#A5D6A7','#558B2F','#DCEDC8'];
let leaves=[];

// Spawn one leaf at the right edge (it travels left with the wind + scroll)
function spawnLeaf(speed){
  const sz=5+Math.random()*9;           // size 5-14 px
  leaves.push({
    x: VW+sz+Math.random()*60,           // start just off right edge
    y: Math.random()*(VH-GH-60)+30,      // random height above ground
    vx:-(speed*0.85+Math.random()*60),   // leftward velocity
    vy:(Math.random()-0.5)*55,           // slight vertical drift
    rot:Math.random()*Math.PI*2,         // initial rotation
    rotV:(Math.random()-0.5)*4,          // spin speed rad/s
    sz,                                  // half-size for drawing
    wobblePhase:Math.random()*Math.PI*2, // sine wobble offset
    wobbleSpeed:2+Math.random()*3,       // wobble frequency
    wobbleAmp:18+Math.random()*28,       // lateral wobble px/s
    col:LEAF_COLORS[~~(Math.random()*LEAF_COLORS.length)],
    alpha:0,                             // fade in
    life:1.0,
    decay:.0018+Math.random()*.003,      // very slow decay — leaves persist
  });
}

// Wind lines pool (streaks that fly across the screen)
let windLines=[];
function spawnWindLine(){
  windLines.push({
    x:VW+10,
    y:Math.random()*(VH-GH-20)+10,
    len:40+Math.random()*90,
    speed:380+Math.random()*200,
    alpha:0.06+Math.random()*0.10,
    life:1,
  });
}

let leafSpawnTimer=0;
let windLineTimer=0;

function updateWind(dt,sp){
  // Decide new gust every 3-8 seconds
  wind.timer-=dt;
  if(wind.timer<=0){
    if(wind.gusting){
      // Gust ends — ease back to calm
      wind.gusting=false;
      wind.target=0;
      wind.timer=3+Math.random()*6;     // calm period
    } else {
      // Start a gust
      wind.gusting=true;
      wind.target=sp*(.35+Math.random()*.45); // gust = 35-80% of scroll speed
      wind.timer=1.5+Math.random()*3.5; // gust duration
    }
  }

  // Smooth transition to target
  const ease=wind.gusting?2.5:1.2;
  wind.strength+=(wind.target-wind.strength)*ease*dt;

  // Visual alpha
  const tAlpha=wind.gusting?Math.min(1,wind.strength/120):0;
  wind.gustAlpha+=(tAlpha-wind.gustAlpha)*3*dt;

  // Spawn leaves during gusts
  if(wind.gusting&&wind.strength>40){
    leafSpawnTimer-=dt;
    if(leafSpawnTimer<=0){
      const count=1+~~(wind.strength/120); // more leaves at stronger gusts
      for(let i=0;i<count;i++) spawnLeaf(sp+wind.strength);
      leafSpawnTimer=.18+Math.random()*.35;
    }
    // Wind streak lines
    windLineTimer-=dt;
    if(windLineTimer<=0){
      spawnWindLine();
      windLineTimer=.04+Math.random()*.08;
    }
  } else {
    leafSpawnTimer=0;
  }

  // Update leaves
  for(const l of leaves){
    l.x+=l.vx*dt;
    l.y+=l.vy*dt;
    l.vy+=20*dt;                                        // gentle gravity
    l.y+=Math.sin(l.wobblePhase)*l.wobbleAmp*dt;       // sine wobble
    l.wobblePhase+=l.wobbleSpeed*dt;
    l.vx-=(l.vx+sp*0.7)*0.4*dt;                        // drag toward scroll speed
    l.rot+=l.rotV*dt;
    // Fade in quickly, then very slowly fade out
    if(l.alpha<1) l.alpha=Math.min(1,l.alpha+dt*3);
    l.life-=l.decay;
    // Also kill if off-screen
    if(l.x<-30||l.y>VH-GH+10||l.y<-30) l.life=0;
  }
  leaves=leaves.filter(l=>l.life>0);

  // Update wind lines
  for(const wl of windLines){
    wl.x-=wl.speed*dt;
    wl.life-=(wl.speed/(VW+wl.len));  // dies when it crosses the screen
    if(wl.x<-wl.len) wl.life=0;
  }
  windLines=windLines.filter(wl=>wl.life>0);
}

// Draw a single leaf as a small rounded teardrop shape
function drawLeafShape(l){
  ctx.save();
  ctx.translate(l.x,l.y);
  ctx.rotate(l.rot);
  ctx.globalAlpha=l.alpha*l.life;
  ctx.fillStyle=l.col;

  // Leaf body: two bezier curves forming an oval leaf
  const s=l.sz;
  ctx.beginPath();
  ctx.moveTo(0,-s);
  ctx.bezierCurveTo(s*.7,-s*.5, s*.7,s*.5, 0,s);
  ctx.bezierCurveTo(-s*.7,s*.5, -s*.7,-s*.5, 0,-s);
  ctx.fill();

  // Central vein
  ctx.strokeStyle='rgba(0,0,0,0.18)';
  ctx.lineWidth=.8;
  ctx.beginPath();ctx.moveTo(0,-s*.85);ctx.lineTo(0,s*.85);ctx.stroke();

  ctx.restore();
}

function drawWindEffect(){
  if(wind.gustAlpha<0.005) return;

  // Wind streaks
  ctx.save();
  for(const wl of windLines){
    ctx.beginPath();
    ctx.moveTo(wl.x,wl.y);
    ctx.lineTo(wl.x+wl.len,wl.y);
    const g=ctx.createLinearGradient(wl.x,0,wl.x+wl.len,0);
    g.addColorStop(0,'rgba(255,255,255,0)');
    g.addColorStop(.4,`rgba(255,255,255,${wl.alpha*wind.gustAlpha})`);
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.strokeStyle=g;ctx.lineWidth=1+Math.random()*.5;
    ctx.stroke();
  }
  ctx.restore();

  // Leaves
  for(const l of leaves) drawLeafShape(l);
}

function newGs(){
  return{
    screen:'title',playing:false,dead:false,

    clouds:[{x:60,y:80,spd:.30,img:'cloud_1'},{x:260,y:170,spd:.25,img:'cloud_2'},{x:410,y:55,spd:.35,img:'cloud_1'}],
    lvUpTimer:0,lvUpText:'',invincible:0,

  };
}
let gs=newGs();

//  BUTTON RECTS
// ════════════════════════════════════════════
function rPlay()   {return{x:VW/2-175,y:VH-145,w:350,h:72}}
function rRestart(){return{x:VW/2-175,y:VH-228,w:350,h:68}}
function rAch()    {return{x:VW/2-175,y:VH-148,w:350,h:60}}
function inR(px,py,r){return px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h}

// ════════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════════
let aInit=false;
function touchA(){ensureAudio();if(!aInit&&aC){aInit=true;loadAudio()}}
function toV(cx,cy){const r=cv.getBoundingClientRect();return{x:(cx-r.left)*VW/r.width,y:(cy-r.top)*VH/r.height}}

function doFlap(){
  touchA();if(gs.dead||gs.screen==='title')return;
  if(!gs.playing){gs.playing=true;gs.screen='playing';gs.startTs=performance.now()}
  if(gs.startTs&&performance.now()-gs.startTs<800)gs.quickStart=true;
  gs.lastFlapVy=gs.bird.vy;
  P.totalFlaps++;save(P);
  const lv=getLv(gs.score);gs.bird.vy=lv.flapStr;gs.bird.flapAnim=1;
  playSound('flap_sound',.7);
}
function doStart(){touchA();gs.screen='playing';gs.playing=true;gs.startTs=performance.now()}
function doRestart(){touchA();gs=newGs();pts=[];leaves=[];windLines=[];wind.strength=0;wind.target=0;wind.timer=2;wind.gusting=false;wind.gustAlpha=0;}

function onDown(e){
  if(achOv.classList.contains('open'))return;
  e.preventDefault();
  const src=e.touches?e.touches[0]:e;
  const{x,y}=toV(src.clientX,src.clientY);
  if(gs.screen==='title'){if(inR(x,y,rPlay()))doStart();return}
  if(gs.dead){
    if(inR(x,y,rRestart())){doRestart();return}
    if(inR(x,y,rAch())){openAch();return}
    return;
  }
  doFlap();
}
cv.addEventListener('touchstart',onDown,{passive:false});
cv.addEventListener('mousedown',onDown);
window.addEventListener('keydown',e=>{
  if(achOv.classList.contains('open')){if(e.key==='Escape')closeAch();return}
  if(['Space','ArrowUp','KeyW'].includes(e.code)){
    e.preventDefault();
    if(gs.screen==='title')doStart();else if(gs.dead)doRestart();else doFlap();
  }
  if(e.code==='KeyA'&&gs.dead)openAch();
});

// ════════════════════════════════════════════
//  PIPE SPAWN
// ════════════════════════════════════════════
function spawnPipe(lv){
  const g=lv.pipeGap,lo=VH*.22+g/2,hi=VH-GH-g/2-20;
  gs.pipes.push({x:VW+10,gapY:lo+Math.random()*(hi-lo),scored:false});
}
function rmostPipe(){return gs.pipes.reduce((m,p)=>Math.max(m,p.x),-Infinity)}

// ════════════════════════════════════════════
//  UPDATE
// ════════════════════════════════════════════
function update(dt){
  if(gs.lvUpTimer>0){gs.lvUpTimer-=dt;gs.invincible=gs.lvUpTimer}
  if(!gs.playing||gs.dead)return;

  const lv=getLv(gs.score),sp=lv.speed;

  // Bird
  gs.bird.vy+=lv.gravity*dt;
  gs.bird.vy=Math.max(-750,Math.min(1000,gs.bird.vy));
  gs.bird.y+=gs.bird.vy*dt;
  gs.bird.rot=Math.max(-30,Math.min(90,gs.bird.vy*.075));
  gs.bird.flapAnim=Math.max(0,gs.bird.flapAnim-dt*6);

  // Pipes
  for(const p of gs.pipes)p.x-=sp*dt;
  gs.pipes=gs.pipes.filter(p=>p.x>-(PW+20));
  if(rmostPipe()<VW-lv.pipeSpacing)spawnPipe(lv);

  // Score + combo
  for(const p of gs.pipes){
    if(!p.scored&&p.x+PW<gs.bird.x){
      p.scored=true;gs.score++;
      if(gs.score>gs.sessionBest)gs.sessionBest=gs.score;
      saveHS(gs.score);

      // Combo: count calm passes (vy not too extreme on flap)
      if(Math.abs(gs.lastFlapVy)<300)gs.combo++;else gs.combo=0;
      if(gs.combo>gs.maxCombo)gs.maxCombo=gs.combo;
      if(gs.maxCombo>P.maxCombo){P.maxCombo=gs.maxCombo;save(P)}

      playSound('score_sound',.6);
      checkAch(gs);

      // Level up
      const ni=getLv(gs.score).idx;
      if(ni>gs.prevLvIdx){
        gs.prevLvIdx=ni;gs.lvUpTimer=1.9;gs.lvUpText=LEVELS[ni].label;
        if(ni>P.maxLvIdx){P.maxLvIdx=ni;save(P)}
        spawnPts(CX,gs.bird.y,32,['#FFD700','#FF6B35','#fff','#FF4444','#44FF88'],1.5);
        shake(5,.25);checkAch(gs);
      }
    }
  }

  // Ground
  gs.groundX-=sp*dt;if(gs.groundX<=-VW)gs.groundX=0;

  // Wind & leaves
  updateWind(dt,sp);

  // Clouds
  for(const c of gs.clouds){
    c.x-=sp*c.spd*dt;
    if(c.x<-160){c.x=VW+20+Math.random()*100;c.y=40+Math.random()*VH*.3}
  }

  updPts(dt);

  // Collision
  if(gs.invincible>0)return;
  const hw=CW*(.5-HB),hh=CH*(.5-HB);
  const cl=gs.bird.x-hw,cr=gs.bird.x+hw,ct=gs.bird.y-hh,cb=gs.bird.y+hh;
  if(cb>=VH-GH||ct<=0){die();return}
  const gap=getLv(gs.score).pipeGap;
  for(const p of gs.pipes){
    if(cr>p.x&&cl<p.x+PW){
      if(ct<p.gapY-gap/2||cb>p.gapY+gap/2){die();return}
    }
  }
}

async function die(){
  gs.dead=true;gs.screen='gameOver';
  P.deaths++;gs.runDeaths++;save(P);
  playSound('hit_sound',.9);shake(8,.35);
  spawnPts(gs.bird.x,gs.bird.y,20,['#FF4444','#FF8800','#FFD700']);
  checkAch(gs);
}

// ════════════════════════════════════════════
//  DRAW HELPERS
// ════════════════════════════════════════════
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function drawSky(lv,ts){
  const g=ctx.createLinearGradient(0,0,0,VH);
  g.addColorStop(0,lv.skyA);g.addColorStop(1,lv.skyB);
  ctx.fillStyle=g;ctx.fillRect(0,0,VW,VH);
  if(lv.idx>=5){
    const al=Math.min(1,(lv.idx-4)*.25);
    for(const s of STARS){
      const tw=.4+.6*Math.abs(Math.sin(ts/800+s.x));
      ctx.fillStyle=`rgba(255,255,255,${s.a*al*tw})`;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    }
  }
}

function drawClouds(lv){
  const al=Math.max(.1,1-lv.idx*.1);
  for(const c of gs.clouds){
    const im=IC[c.img];if(!im)continue;
    ctx.save();ctx.globalAlpha=al;ctx.drawImage(im,c.x,c.y,120,52);ctx.restore();
  }
}

function drawPipes(lv){
  const body=IC['pipe_green'],cap=IC['pipe_cap'],gap=lv.pipeGap;
  for(const p of gs.pipes){
    const gt=p.gapY-gap/2,gb=p.gapY+gap/2;
    if(!body){ctx.fillStyle='#5DBE4A';if(gt>0)ctx.fillRect(p.x,0,PW,gt);ctx.fillRect(p.x,gb,PW,VH-GH-gb);continue}
    const th=Math.max(0,gt-42);
    if(th>0)ctx.drawImage(body,p.x,0,PW,th);
    if(cap&&gt>0){ctx.save();ctx.translate(p.x+PW/2,gt);ctx.scale(1,-1);ctx.drawImage(cap,-PW/2-10,0,PW+20,42);ctx.restore()}
    if(cap)ctx.drawImage(cap,p.x-10,gb,PW+20,42);
    const by=gb+42,bh=Math.max(0,VH-GH-by);
    if(bh>0)ctx.drawImage(body,p.x,by,PW,bh);
  }
}

function drawGround(){
  const gy=VH-GH,im=IC['ground_texture'];
  if(im){ctx.drawImage(im,gs.groundX,gy,VW,GH);ctx.drawImage(im,gs.groundX+VW,gy,VW,GH)}
  else{ctx.fillStyle='#DEB887';ctx.fillRect(0,gy,VW,GH)}
  ctx.fillStyle='#7A5020';ctx.fillRect(0,gy,VW,4);
}

function drawBird(ts){
  const b=gs.bird,im=IC['donald_bird_character'];
  ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.rot*Math.PI/180);
  const sq=1+b.flapAnim*.12;ctx.scale(1/sq,sq);
  if(im)ctx.drawImage(im,-CW/2,-CH/2,CW,CH);
  else{ctx.fillStyle='#FFD700';ctx.beginPath();ctx.ellipse(0,0,CW/2,CH/2,0,0,Math.PI*2);ctx.fill()}
  if(gs.invincible>0&&Math.sin(ts/60)>0){ctx.globalAlpha=.35;ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(0,0,CW/2,CH/2,0,0,Math.PI*2);ctx.fill()}
  ctx.restore();
}

function drawHUD(lv){
  // Score
  ctx.save();
  ctx.font='44px "Press Start 2P",monospace';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.shadowColor='rgba(0,0,0,.8)';ctx.shadowBlur=10;ctx.shadowOffsetX=3;ctx.shadowOffsetY=3;
  ctx.fillStyle='#fff';ctx.fillText(gs.score,VW/2,28);

  // Combo display (if active)
  if(gs.combo>=3){
    const col=gs.combo>=30?'#FF00FF':gs.combo>=15?'#00FFFF':gs.combo>=5?'#FFD700':'#FFA500';
    ctx.font='16px "VT323",monospace';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillStyle=col;ctx.shadowBlur=6;ctx.shadowColor=col;
    ctx.fillText(`🔥 COMBO x${gs.combo}`,VW/2,80);
  }

  // Level badge top-right
  const lbC=['#78C8E8','#55B0D8','#3E9FD0','#2878B0','#1E5C9A','#163F7A','#0E2858','#6644AA','#AA2266','#FF2200'];
  rr(VW-120,18,104,48,8);ctx.fillStyle=lbC[lv.idx]||'#FFD700';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.45)';ctx.lineWidth=2;ctx.stroke();
  ctx.font='9px "Press Start 2P",monospace';ctx.shadowBlur=4;
  ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(`LVL ${lv.idx}`,VW-68,36);
  ctx.font='7px "Press Start 2P",monospace';ctx.fillStyle='rgba(255,255,255,.85)';
  ctx.fillText(lv.label,VW-68,51);

  // Achievements counter top-left
  const done=P.unlocked.length,total=ACH.length;
  ctx.font='11px "VT323",monospace';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillStyle='rgba(255,215,0,.65)';ctx.shadowBlur=0;
  ctx.fillText(`🏆${done}/${total}`,10,32);
  ctx.restore();
}

function drawLvUp(){
  if(gs.lvUpTimer<=0)return;
  const al=Math.min(1,gs.lvUpTimer),sc=1+(1-al)*.3;
  ctx.save();ctx.globalAlpha=al;ctx.translate(VW/2,VH*.32);ctx.scale(sc,sc);
  rr(-165,-40,330,80,16);
  const g=ctx.createLinearGradient(-165,-40,165,40);
  g.addColorStop(0,'rgba(255,165,0,.93)');g.addColorStop(1,'rgba(255,40,0,.93)');
  ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='#FFD700';ctx.lineWidth=3;ctx.stroke();
  ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=8;
  ctx.font='11px "Press Start 2P",monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#fff';ctx.fillText('LEVEL UP!',0,-13);
  ctx.font='9px "Press Start 2P",monospace';ctx.fillStyle='#FFD700';ctx.fillText(gs.lvUpText,0,14);
  ctx.restore();
}

function drawBtn(lbl,rect,t,b){
  const{x,y,w,h}=rect;
  const g=ctx.createLinearGradient(x,y,x,y+h);g.addColorStop(0,t);g.addColorStop(1,b);
  rr(x,y,w,h,10);ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=2.5;ctx.stroke();
  const fs=Math.max(9,Math.min(15,w/22));
  ctx.font=`${fs}px "Press Start 2P",monospace`;ctx.fillStyle='#fff';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=4;
  ctx.fillText(lbl,x+w/2,y+h/2);ctx.shadowColor='transparent';ctx.shadowBlur=0;
}

// ════════════════════════════════════════════
//  SCREENS
// ════════════════════════════════════════════
function drawTitle(lv,ts){
  drawSky(lv,ts);drawClouds(lv);drawGround();drawWindEffect();
  const hy=VH*.4+Math.sin(ts/600)*9,im=IC['donald_bird_character'];
  if(im)ctx.drawImage(im,CX-CW/2,hy-CH/2,CW,CH);
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,VW,VH*.6);
  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,.9)';ctx.shadowBlur=16;ctx.shadowOffsetX=4;ctx.shadowOffsetY=4;
  ctx.font='52px "Press Start 2P",monospace';
  ctx.fillStyle='#FFD700';ctx.fillText('FLAPPY',VW/2,VH*.17);
  ctx.fillStyle='#FF5252';ctx.fillText('TRUMP',VW/2,VH*.28);
  ctx.restore();
  if(P.highScore>0){
    ctx.save();ctx.font='11px "Press Start 2P",monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#FFD700';ctx.shadowColor='rgba(0,0,0,.7)';ctx.shadowBlur=4;
    ctx.fillText(`BEST: ${P.highScore}`,VW/2,VH*.40);ctx.restore();
  }
  const done=P.unlocked.length,total=ACH.length;
  ctx.font='15px "VT323",monospace';ctx.textAlign='center';ctx.fillStyle='rgba(255,215,0,.55)';
  ctx.fillText(`🏆 ${done}/${total} Achievements  •  Deaths: ${P.deaths}`,VW/2,VH*.465);
  ctx.font='15px "VT323",monospace';ctx.fillStyle='rgba(255,255,255,.55)';
  ctx.fillText('SPACE / CLICK / TAP to start',VW/2,VH*.51);
  drawBtn('▶  START GAME',rPlay(),'#43A047','#1B5E20');
}

function drawPlaying(lv,ts){
  drawSky(lv,ts);drawClouds(lv);drawPipes(lv);drawGround();drawWindEffect();drwPts();drawBird(ts);drawHUD(lv);drawLvUp();
  if(!gs.playing){
    const b={x:VW/2-148,y:VH-138,w:296,h:60};const a=.78+Math.sin(ts/400)*.18;
    ctx.save();ctx.globalAlpha=a;rr(b.x,b.y,b.w,b.h,10);
    ctx.fillStyle='rgba(0,0,0,.58)';ctx.fill();ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=2;ctx.stroke();
    ctx.globalAlpha=1;ctx.font='11px "Press Start 2P",monospace';
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('TAP TO FLAP',VW/2,b.y+b.h/2);ctx.restore();
  }
}

function drawGameOver(lv,ts){
  drawSky(lv,ts);drawClouds(lv);drawPipes(lv);drawGround();drawWindEffect();drwPts();drawBird(ts);
  ctx.fillStyle='rgba(0,0,0,.83)';ctx.fillRect(0,0,VW,VH);

  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,.7)';ctx.shadowBlur=10;ctx.shadowOffsetX=3;ctx.shadowOffsetY=3;

  ctx.font='38px "Press Start 2P",monospace';ctx.fillStyle='#FF5252';
  ctx.fillText('GAME OVER',VW/2,VH*.13);

  // Score card
  const cx=VW/2,cw=340,ch=160,cy=VH*.20;
  rr(cx-cw/2,cy,cw,ch,14);ctx.fillStyle='rgba(255,255,255,.07)';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.shadowBlur=4;
  ctx.font='20px "VT323",monospace';ctx.fillStyle='#FFD700';ctx.fillText('SCORE',cx,cy+28);
  ctx.font='32px "Press Start 2P",monospace';ctx.fillStyle='#fff';ctx.fillText(gs.score,cx,cy+68);
  ctx.font='18px "VT323",monospace';ctx.fillStyle='#FFD700';ctx.fillText('BEST',cx,cy+104);
  ctx.font='24px "Press Start 2P",monospace';ctx.fillStyle='#fff';ctx.fillText(P.highScore,cx,cy+140);

  // Stats bar
  ctx.font='13px "VT323",monospace';ctx.fillStyle='rgba(255,255,255,.4)';
  ctx.fillText(`Level: ${lv.label}  •  Combo: ${gs.maxCombo}  •  Deaths: ${P.deaths}`,cx,cy+ch+18);

  // Combo highlight
  if(gs.maxCombo>=5){
    ctx.font='14px "VT323",monospace';
    const comboCol=gs.maxCombo>=50?'#FF00FF':gs.maxCombo>=15?'#00FFFF':'#FFD700';
    ctx.fillStyle=comboCol;
    ctx.fillText(`🔥 Best Combo This Run: x${gs.maxCombo}`,cx,cy+ch+36);
  }

  // Achievements progress ring
  const done=P.unlocked.length,total=ACH.length;
  rr(cx-155,VH*.56,310,44,10);ctx.fillStyle='rgba(255,215,0,.07)';ctx.fill();
  ctx.strokeStyle='rgba(255,215,0,.2)';ctx.lineWidth=1;ctx.stroke();
  ctx.font='12px "VT323",monospace';ctx.fillStyle='rgba(255,215,0,.7)';
  ctx.fillText(`🏆 ${done} / ${total} Achievements Unlocked`,cx,VH*.56+22);

  // Progress bar
  rr(cx-130,VH*.56+34,260,6,3);ctx.fillStyle='rgba(255,255,255,.1)';ctx.fill();
  rr(cx-130,VH*.56+34,260*(done/total),6,3);ctx.fillStyle='#FFD700';ctx.fill();

  ctx.restore();
  drawBtn('↺  PLAY AGAIN',rRestart(),'#1565C0','#0D47A1');
  drawBtn('🏆  ACHIEVEMENTS',rAch(),'#6A1B9A','#4A148C');
}

// ════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════
let lastTs=0;
function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,MAXDT);lastTs=ts;
  update(dt);
  // Keep wind alive on title screen (uses a gentle ambient speed)
  if(gs.screen==='title') updateWind(dt, 180);
  const lv=getLv(gs.score);
  const{sx,sy}=getShake(dt);
  ctx.save();ctx.translate(sx,sy);
  if(gs.screen==='title')       drawTitle(lv,ts);
  else if(gs.screen==='playing')drawPlaying(lv,ts);
  else if(gs.screen==='gameOver')drawGameOver(lv,ts);
  ctx.restore();
  requestAnimationFrame(loop);
}

// ════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════
(async function boot(){
  cv.width=VW;cv.height=VH;
  ctx.fillStyle='#0a0015';ctx.fillRect(0,0,VW,VH);
  ctx.font='13px "Press Start 2P",monospace';ctx.fillStyle='#FFD700';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('LOADING...',VW/2,VH/2-22);
  ctx.fillStyle='rgba(255,255,255,.08)';rr(VW/2-100,VH/2+6,200,14,7);ctx.fill();
  ctx.font='7px "Press Start 2P",monospace';ctx.fillStyle='rgba(255,255,255,.3)';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('powered by SK',VW/2,VH/2+36);
  await loadImages();
  ctx.fillStyle='#FFD700';rr(VW/2-100,VH/2+6,200,14,7);ctx.fill();
  await new Promise(r=>setTimeout(r,200));
  requestAnimationFrame(loop);
})();

// ════════════════════════════════════════════
//  PWA SERVICE WORKER
// ════════════════════════════════════════════
if('serviceWorker' in navigator){
  const sw=`const C='ft-v5',U=['./'];
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(U)).then(()=>self.skipWaiting()))});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()))});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./'))))});`;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
